<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Meeting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: rgba(28, 28, 30, 0.96);
      color: #f5f5f7;
      height: 100vh;
      -webkit-user-select: none;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: 1fr 1fr;
      align-items: center;
      padding: 6px 14px;
      width: 100%;
      height: 100%;
      column-gap: 12px;
      row-gap: 0;
    }

    .icon {
      grid-row: 1 / 3;
      align-self: center;
      opacity: 0.75;
      flex-shrink: 0;
    }

    .title {
      grid-column: 2;
      grid-row: 1;
      align-self: end;
      font-size: 12.5px;
      font-weight: 500;
      color: #e5e5ea;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .meta {
      grid-column: 2;
      grid-row: 2;
      align-self: start;
      font-size: 11px;
      color: #8e8e93;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }

    .meta.urgent {
      color: #ff453a;
    }

    .action {
      grid-column: 3;
      grid-row: 1;
      align-self: end;
      justify-self: end;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: #64d2ff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      letter-spacing: -0.01em;
      transition: color 0.1s;
      white-space: nowrap;
      line-height: 1.4;
    }

    .action:hover { color: #99e4ff; }
    .action:active { color: #40c8f0; }
    .action:disabled { color: #48484a; cursor: default; }

    .close {
      grid-column: 3;
      grid-row: 2;
      align-self: start;
      justify-self: end;
      font-family: inherit;
      font-size: 12px;
      color: #48484a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1.4;
      transition: color 0.1s;
    }

    .close:hover { color: #8e8e93; }

    .error-text {
      position: fixed;
      bottom: 2px;
      left: 14px;
      font-size: 10px;
      color: #ff453a;
      display: none;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(48, 209, 88, 0.9);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 14px;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body { animation: slideIn 200ms ease-out; }
  </style>
</head>
<body role="alertdialog" aria-label="Upcoming meeting">
  <div class="bar">
    <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="5" width="18" height="16" rx="2" stroke="#e5e5ea" stroke-width="1.6"/>
      <path d="M3 9h18" stroke="#e5e5ea" stroke-width="1.6"/>
      <path d="M8 3v4M16 3v4" stroke="#e5e5ea" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <div class="title" id="title"></div>
    <div class="meta" id="meta"></div>
    <button class="action" id="primary-btn" autofocus>Record</button>
    <button class="close" id="close-btn" aria-label="Dismiss">&#x2715;</button>
  </div>
  <div class="error-text" id="error-text"></div>
  <div class="toast" id="toast">Recording &#x2713;</div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    function fromBase64Utf8(b64) {
      const bin = atob(b64);
      const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    let data = { title: 'Meeting', minutesUntil: 0, url: '' };
    try {
      const raw = window.location.hash.slice(1);
      if (raw) data = JSON.parse(fromBase64Utf8(raw));
    } catch (e) {
      console.error('failed to parse meeting data', e);
    }

    const hasUrl = data.url && data.url.length > 0;
    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');
    const primaryBtn = document.getElementById('primary-btn');
    const errorEl = document.getElementById('error-text');
    const toast = document.getElementById('toast');

    titleEl.textContent = data.title;
    titleEl.title = data.title;

    if (data.minutesUntil <= 0) {
      metaEl.textContent = 'starting now';
      metaEl.classList.add('urgent');
    } else if (data.minutesUntil === 1) {
      metaEl.textContent = 'in 1 minute';
    } else {
      metaEl.textContent = `in ${data.minutesUntil} minutes`;
    }

    primaryBtn.textContent = hasUrl ? 'Join & Record' : 'Record';
    primaryBtn.focus();

    async function startRecording() {
      primaryBtn.disabled = true;
      primaryBtn.textContent = '…';

      try {
        if (hasUrl) {
          await invoke('cmd_open_meeting_url', { url: data.url });
        }
        await invoke('cmd_start_recording');
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => getCurrentWebviewWindow().close(), 200);
        }, 600);
      } catch (e) {
        primaryBtn.disabled = false;
        primaryBtn.textContent = hasUrl ? 'Join & Record' : 'Record';
        errorEl.textContent = String(e);
        errorEl.style.display = 'block';
      }
    }

    function dismiss() {
      getCurrentWebviewWindow().close();
    }

    primaryBtn.addEventListener('click', startRecording);
    document.getElementById('close-btn').addEventListener('click', dismiss);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismiss();
    });

    setTimeout(() => {
      document.body.style.transition = 'opacity 250ms ease-out';
      document.body.style.opacity = '0';
      setTimeout(() => getCurrentWebviewWindow().close(), 250);
    }, 60000);
  </script>
</body>
</html>
