<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Detected</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      user-select: none;
      border: 1px solid #38383a;
      border-radius: 10px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .call-info {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .call-icon {
      font-size: 16px;
      line-height: 1.3;
      flex-shrink: 0;
    }

    .call-text {
      min-width: 0;
    }

    .call-title {
      font-size: 15px;
      font-weight: 600;
      color: #f5f5f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .call-subtitle {
      font-size: 13px;
      color: #8e8e93;
      margin-top: 2px;
    }

    .close-btn {
      padding: 2px 8px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #636366;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }

    .close-btn:hover { color: #86868b; background: #38383a; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #ef4444;
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover { background: #f87171; }
    .btn-primary:active { background: #dc2626; transform: scale(0.97); }
    .btn-primary:disabled { background: #38383a; color: #636366; cursor: default; transform: none; }

    .btn-secondary {
      background: transparent;
      color: #86868b;
      border: 1px solid #38383a;
    }

    .btn-secondary:hover { background: #38383a; color: #f5f5f7; }
    .btn-secondary:active { transform: scale(0.97); }

    .error-text {
      font-size: 12px;
      color: #ff453a;
      margin-top: 8px;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: #30d158;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      animation: slideIn 300ms ease-out;
    }
  </style>
</head>
<body role="alertdialog" aria-label="Call detected">
  <div class="header">
    <div class="call-info">
      <span class="call-icon">🎙</span>
      <div class="call-text">
        <div class="call-title" id="title"></div>
        <div class="call-subtitle">Click to start transcribing</div>
      </div>
    </div>
    <button class="close-btn" id="close-btn" aria-label="Dismiss">✕</button>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="record-btn" autofocus>Start Recording</button>
    <button class="btn btn-secondary" id="dismiss-btn">Dismiss</button>
  </div>
  <div class="error-text" id="error-text"></div>
  <div class="toast" id="toast">Recording started ✓</div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    // Parse app name from URL fragment
    const appName = decodeURIComponent(window.location.hash.slice(1)) || 'Call';

    // Set content
    const titleEl = document.getElementById('title');
    const recordBtn = document.getElementById('record-btn');
    const errorEl = document.getElementById('error-text');
    const toast = document.getElementById('toast');

    titleEl.textContent = appName + ' call detected';

    // Auto-focus record button
    recordBtn.focus();

    // Actions
    async function startRecording() {
      recordBtn.disabled = true;
      recordBtn.textContent = 'Starting...';

      try {
        await invoke('cmd_start_recording');
        await invoke('cmd_mark_call_triggered', { appName: appName });

        // Success toast
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => getCurrentWebviewWindow().close(), 200);
        }, 600);
      } catch (e) {
        recordBtn.disabled = false;
        recordBtn.textContent = 'Start Recording';
        errorEl.textContent = String(e);
        errorEl.style.display = 'block';
      }
    }

    function dismiss() {
      getCurrentWebviewWindow().close();
    }

    recordBtn.addEventListener('click', startRecording);
    document.getElementById('dismiss-btn').addEventListener('click', dismiss);
    document.getElementById('close-btn').addEventListener('click', dismiss);

    // Keyboard: Escape to dismiss
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismiss();
    });

    // Auto-dismiss after 30 seconds
    setTimeout(() => {
      document.body.style.transition = 'opacity 300ms ease-out';
      document.body.style.opacity = '0';
      setTimeout(() => getCurrentWebviewWindow().close(), 300);
    }, 30000);
  </script>
</body>
</html>
