<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Detected</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: rgba(28, 28, 30, 0.96);
      color: #f5f5f7;
      height: 100vh;
      display: flex;
      align-items: center;
      -webkit-user-select: none;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      width: 100%;
      height: 100%;
    }

    .icon {
      flex-shrink: 0;
      opacity: 0.55;
    }

    .label {
      font-size: 12.5px;
      font-weight: 400;
      color: #a1a1a6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      letter-spacing: -0.01em;
    }

    .app-name {
      color: #e5e5ea;
      font-weight: 500;
    }

    .sep {
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .action {
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: #64d2ff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 0;
      white-space: nowrap;
      letter-spacing: -0.01em;
      transition: color 0.1s;
      flex-shrink: 0;
    }

    .action:hover { color: #99e4ff; }
    .action:active { color: #40c8f0; }
    .action:disabled { color: #48484a; cursor: default; }

    .close {
      font-family: inherit;
      font-size: 13px;
      color: #48484a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .close:hover { color: #8e8e93; }

    .error-text {
      position: fixed;
      bottom: 4px;
      left: 14px;
      font-size: 10px;
      color: #ff453a;
      display: none;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(48, 209, 88, 0.9);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 14px;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body { animation: slideIn 200ms ease-out; }
  </style>
</head>
<body role="alertdialog" aria-label="Call detected">
  <div class="bar">
    <!-- Waveform icon matching the Minutes tray icon -->
    <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
      <rect x="4" y="9" width="2.5" height="6" rx="1.25" fill="#e5e5ea"/>
      <rect x="8.5" y="5" width="2.5" height="14" rx="1.25" fill="#e5e5ea"/>
      <rect x="13" y="3" width="2.5" height="18" rx="1.25" fill="#e5e5ea"/>
      <rect x="17.5" y="7" width="2.5" height="10" rx="1.25" fill="#e5e5ea"/>
    </svg>
    <div class="label"><span class="app-name" id="app-name"></span> call detected</div>
    <div class="sep"></div>
    <button class="action" id="record-btn" autofocus>Record</button>
    <button class="close" id="close-btn" aria-label="Dismiss">&#x2715;</button>
  </div>
  <div class="error-text" id="error-text"></div>
  <div class="toast" id="toast">Recording &#x2713;</div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    const appName = decodeURIComponent(window.location.hash.slice(1)) || 'Call';

    const appNameEl = document.getElementById('app-name');
    const recordBtn = document.getElementById('record-btn');
    const errorEl = document.getElementById('error-text');
    const toast = document.getElementById('toast');

    appNameEl.textContent = appName;

    recordBtn.focus();

    async function startRecording() {
      recordBtn.disabled = true;
      recordBtn.textContent = '\u2026';

      try {
        await invoke('cmd_mark_call_triggered', { appName: appName });
        await invoke('cmd_start_recording');
        getCurrentWebviewWindow().close();
      } catch (e) {
        recordBtn.disabled = false;
        recordBtn.textContent = 'Record';
        errorEl.textContent = String(e);
        errorEl.style.display = 'block';
      }
    }

    function dismiss() {
      getCurrentWebviewWindow().close();
    }

    recordBtn.addEventListener('click', startRecording);
    document.getElementById('close-btn').addEventListener('click', dismiss);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') dismiss();
    });

    setTimeout(function() {
      document.body.style.transition = 'opacity 250ms ease-out';
      document.body.style.opacity = '0';
      setTimeout(function() { getCurrentWebviewWindow().close(); }, 250);
    }, 30000);
  </script>
</body>
</html>
