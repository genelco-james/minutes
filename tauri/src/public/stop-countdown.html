<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopping</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: rgba(28, 28, 30, 0.96);
      color: #f5f5f7;
      height: 100vh;
      display: flex;
      align-items: center;
      -webkit-user-select: none;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      width: 100%;
      height: 100%;
    }
    .icon { flex-shrink: 0; opacity: 0.55; }
    .label {
      font-size: 12.5px;
      font-weight: 400;
      color: #a1a1a6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      letter-spacing: -0.01em;
    }
    .countdown { color: #e5e5ea; font-weight: 500; font-variant-numeric: tabular-nums; }
    .sep { width: 1px; height: 14px; background: rgba(255, 255, 255, 0.08); flex-shrink: 0; }
    .action {
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: #34d399;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 0;
      white-space: nowrap;
      letter-spacing: -0.01em;
      transition: color 0.1s;
      flex-shrink: 0;
    }
    .action:hover { color: #6ee7b7; }
    .action:active { color: #10b981; }
    .close {
      font-family: inherit;
      font-size: 13px;
      color: #48484a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .close:hover { color: #8e8e93; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body { animation: slideIn 200ms ease-out; }
  </style>
</head>
<body role="alertdialog" aria-label="Stopping recording">
  <div class="bar">
    <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
      <rect x="4" y="9" width="2.5" height="6" rx="1.25" fill="#e5e5ea"/>
      <rect x="8.5" y="5" width="2.5" height="14" rx="1.25" fill="#e5e5ea"/>
      <rect x="13" y="3" width="2.5" height="18" rx="1.25" fill="#e5e5ea"/>
      <rect x="17.5" y="7" width="2.5" height="10" rx="1.25" fill="#e5e5ea"/>
    </svg>
    <div class="label">Stopping in <span class="countdown" id="countdown">10</span>s</div>
    <div class="sep"></div>
    <button class="action" id="continue-btn" autofocus>Continue</button>
    <button class="close" id="close-btn" aria-label="Stop now">&#x2715;</button>
  </div>

  <script>
    var invoke = window.__TAURI__.core.invoke;
    var getCurrentWebviewWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow;

    var remaining = 10;
    var countdownEl = document.getElementById('countdown');
    var stopped = false;

    var timer = setInterval(function() {
      remaining--;
      countdownEl.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(timer);
        stopRecording();
      }
    }, 1000);

    function stopRecording() {
      if (stopped) return;
      stopped = true;
      invoke('cmd_stop_recording').catch(function() {});
      getCurrentWebviewWindow().close();
    }

    function continueRecording() {
      if (stopped) return;
      stopped = true;
      clearInterval(timer);
      invoke('cmd_cancel_auto_stop').catch(function() {});
      getCurrentWebviewWindow().close();
    }

    document.getElementById('continue-btn').addEventListener('click', continueRecording);
    document.getElementById('close-btn').addEventListener('click', stopRecording);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') continueRecording();
    });

    document.getElementById('continue-btn').focus();
  </script>
</body>
</html>
