<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minutes</title>
    <style>
      html, body { margin: 0; padding: 0; background: #1a1a1c; color: #ececee; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; }
      #error-display { padding: 20px; font-size: 12px; color: #ef4444; white-space: pre-wrap; word-break: break-all; display: none; }
      #error-display.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('error-display');
        el.className = 'visible';
        el.textContent = 'JS Error: ' + msg + '\nAt: ' + url + ':' + line + ':' + col + '\n' + (error ? error.stack : '');
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-display');
        el.className = 'visible';
        el.textContent = 'Promise rejection: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown') + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '');
      });
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
